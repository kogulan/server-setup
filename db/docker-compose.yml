services:
  postgres:
    image: postgres:16
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - /opt/deploy/data/postgres:/var/lib/postgresql/data
    networks:
      - deploy-network
    deploy:
      resources:
        limits:
          memory: ${DB_MEMORY_LIMIT:-512M}

  mariadb:
    image: mariadb:lts
    container_name: mariadb-db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-password}
    volumes:
      - /opt/deploy/data/mariadb:/var/lib/mysql
    networks:
      - deploy-network
    deploy:
      resources:
        limits:
          memory: ${DB_MEMORY_LIMIT:-512M}

  adminer:
    image: adminer:standalone
    container_name: adminer
    restart: always
    networks:
      - deploy-network
    deploy:
      resources:
        limits:
          memory: 64M

networks:
  deploy-network:
    external: true
