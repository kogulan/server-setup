services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-automation
    restart: always
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=${N8N_DB:-n8n}
      - DB_POSTGRESDB_HOST=postgres-db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${N8N_DB_USER:-n8n_user}
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASS:-n8n_pass}
      - N8N_PORT=5678
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    volumes:
      - /opt/deploy/data/n8n:/home/node/.n8n
    networks:
      - deploy-network
    deploy:
      resources:
        limits:
          memory: ${AUTOMATION_MEMORY_LIMIT:-512M}

  activepieces:
    image: activepieces/activepieces:latest
    container_name: activepieces-automation
    restart: always
    environment:
      - AP_DB_ENGINE=POSTGRES
      - AP_POSTGRES_DATABASE=${AP_DB:-activepieces}
      - AP_POSTGRES_HOST=postgres-db
      - AP_POSTGRES_PORT=5432
      - AP_POSTGRES_USERNAME=${AP_DB_USER:-ap_user}
      - AP_POSTGRES_PASSWORD=${AP_DB_PASS:-ap_pass}
      - AP_REDIS_URL=redis://redis:6379
      - AP_ENVIRONMENT=production
      - AP_FRONTEND_URL=${AP_URL:-http://localhost:8081}
      - AP_ENCRYPTION_KEY=${AP_ENCRYPTION_KEY}
      - AP_JWT_SECRET=${AP_JWT_SECRET}
      - AP_CONTAINER_TYPE=WORKER_AND_APP
    volumes:
      - /opt/deploy/data/activepieces:/root/.activepieces
    networks:
      - deploy-network
    deploy:
      resources:
        limits:
          memory: ${AUTOMATION_MEMORY_LIMIT:-512M}

  huginn:
    image: ghcr.io/huginn/huginn:latest
    container_name: huginn-automation
    restart: always
    depends_on:
      - redis
    environment:
      - RAILS_ENV=production
      - RACK_ENV=production
      - FORCE_SSL=false
      - DOMAIN=${HUGINN_DOMAIN:-localhost:3000}
      - PORT=3000
      - POSTGRES_PORT_5432_TCP_ADDR=postgres-db
      - POSTGRES_PORT_5432_TCP_PORT=5432
      - DATABASE_ADAPTER=postgresql
      - DATABASE_ENCODING=utf8
      - DATABASE_RECONNECT=true
      - DATABASE_NAME=${HUGINN_DB:-huginn}
      - DATABASE_HOST=postgres-db
      - DATABASE_PORT=5432
      - DATABASE_USERNAME=${HUGINN_DB_USER:-huginn_user}
      - DATABASE_PASSWORD=${HUGINN_DB_PASS:-huginn_pass}
      - HUGINN_DATABASE_ADAPTER=postgresql
      - HUGINN_DATABASE_NAME=${HUGINN_DB:-huginn}
      - HUGINN_DATABASE_HOST=postgres-db
      - HUGINN_DATABASE_PORT=5432
      - HUGINN_DATABASE_USERNAME=${HUGINN_DB_USER:-huginn_user}
      - HUGINN_DATABASE_PASSWORD=${HUGINN_DB_PASS:-huginn_pass}
      - DO_NOT_CREATE_DATABASE=true
      - REDIS_URL=redis://redis:6379
      - APP_SECRET_TOKEN=${HUGINN_APP_SECRET_TOKEN}
      - INVITATION_CODE=${HUGINN_INVITATION_CODE}
      - IMPORT_DEFAULT_SCENARIO_FOR_ALL_USERS=false
    volumes:
      - /opt/deploy/data/huginn:/app/data
    networks:
      - deploy-network
    deploy:
      resources:
        limits:
          memory: ${HUGINN_MEMORY_LIMIT:-1G}

  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    command: redis-server
    networks:
      - deploy-network
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  deploy-network:
    external: true
