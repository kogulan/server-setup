services:
  sftp:
    image: atmoz/sftp:latest
    container_name: sftp-server
    # Explicitly pull arm64 if available or use a multi-arch tag if needed.
    # atmoz/sftp usually supports arm64, but we can also use 'alpine' tag which is more lightweight and multi-arch.
    # image: atmoz/sftp:alpine
    restart: always
    ports:
      - "2222:22"
    volumes:
      - /opt/deploy/data/web_root:/home/webuser/web_root
      - /opt/deploy/data/ftp_storage:/home/filesuser/my_ftp_files
      - /opt/deploy/storage/users.conf:/etc/sftp/users.conf:ro
    networks:
      - deploy-network
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  deploy-network:
    external: true
