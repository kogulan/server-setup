services:
  php-fpm:
    build: .
    container_name: php-webserver
    restart: always
    environment:
      - TZ=${TIMEZONE:-UTC}
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - WEB_DB_USER=${WEB_DB_USER}
      - WEB_DB_PASS=${WEB_DB_PASS}
      - WEB_DB_NAME=${WEB_DB_NAME}
      - ACCESS_CHOICE=${ACCESS_CHOICE}
    volumes:
      - /opt/deploy/data/web_root:/var/www/html
      - /opt/deploy/webserver/timezone.ini:/usr/local/etc/php/conf.d/timezone.ini:ro
    networks:
      - deploy-network
    deploy:
      resources:
        limits:
          memory: ${PHP_MEMORY_LIMIT:-256M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  deploy-network:
    external: true
